name: Sync upstream

on:
  schedule:
    - cron: "0 6 * * *"   # every day 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/Moonfin-Client/AndroidTV-FireTV.git || true
          git fetch upstream

      - name: Merge upstream into master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master
          git merge upstream/master --no-edit

      - name: Push
        run: |
          git push origin master
